[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Fail on warnings that indicate real problems
filterwarnings =
    error::DeprecationWarning
    error::PendingDeprecationWarning

# Readable output
addopts =
    --tb=short
    --strict-markers
    -q
